services:

  # ─────────────────────────────────────────────
  # PostgreSQL 15 — Única base de datos monolítica
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: university_postgres
    env_file: .env
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       university_db
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/postgres.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - university_net
    restart: unless-stopped
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d university_db"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ─────────────────────────────────────────────
  # Redis 7 — Caché y validación JWT
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: university_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - university_net
    restart: unless-stopped
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ─────────────────────────────────────────────
  # Backend Center (Django + Gunicorn)
  # ─────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: university_backend
    env_file: .env
    environment:
      DB_NAME:      university_db
      DB_USER:      ${POSTGRES_USER}
      DB_PASSWORD:  ${POSTGRES_PASSWORD}
      DB_HOST:      postgres
      DB_PORT:      5432
      SECRET_KEY:   ${SECRET_KEY}
      DEBUG:        ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379/0
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      LOG_LEVEL:    ${LOG_LEVEL:-info}
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - university_net
    restart: unless-stopped
    healthcheck:
      test:         ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8000),timeout=3); s.close()"]
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 40s

volumes:
  postgres_data:
  redis_data:
  backend_static:

networks:
  university_net:
    driver: bridge
